<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reflecting a Beta Random Variable</title>
  <link rel="stylesheet" href="../lab-styles.css" />
  <style>
    body {
      margin: 0;
      background: var(--lab-bg);
    }

    .lab-step-panel-stack {
      display: grid;
      gap: 14px;
    }

    .lab-answer-field {
      display: grid;
      gap: 8px;
    }

    .lab-answer-label {
      color: var(--lab-muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
    }

    .lab-answer-input {
      width: 100%;
      min-height: 44px;
      padding: 0 14px;
      border: 1px solid var(--lab-border);
      border-radius: 12px;
      background: var(--lab-surface);
      color: var(--lab-ink);
      font: inherit;
    }

    .lab-answer-input:focus-visible {
      outline: 2px solid var(--lab-focus);
      outline-offset: 3px;
    }

    .lab-hint,
    .lab-feedback {
      display: grid;
      gap: 8px;
      padding: 14px;
      border: 1px solid var(--lab-border);
      border-radius: 12px;
      background: var(--lab-surface-soft);
    }

    .lab-feedback-correct {
      border-color: var(--lab-accent-green);
      background: var(--lab-accent-green-soft);
    }

    .lab-feedback-incorrect {
      border-color: var(--lab-accent-violet);
      background: var(--lab-accent-violet-soft);
    }

    .lab-hint-title,
    .lab-feedback-title,
    .lab-feedback-explanation {
      margin: 0;
    }

    .lab-hint-title,
    .lab-feedback-title {
      color: var(--lab-ink);
      font-size: 15px;
      line-height: 1.2;
    }

    .lab-feedback-explanation {
      color: var(--lab-muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .p11-viz {
      display: grid;
      gap: 16px;
    }

    .p11-viz-density {
      width: 100%;
      min-height: 230px;
      border: 1px solid var(--lab-border-strong);
      border-radius: 12px;
      background: var(--lab-surface);
    }

    .p11-viz-axis,
    .p11-viz-midline {
      stroke: var(--lab-border-strong);
      stroke-width: 2;
    }

    .p11-viz-midline {
      stroke-dasharray: 5 6;
    }

    .p11-viz-path {
      fill: none;
      stroke: var(--lab-accent-green);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 4;
    }

    .p11-viz-path.is-reflected {
      stroke: var(--lab-accent-pink);
    }

    .p11-viz-path.is-muted {
      opacity: 0.46;
    }

    .p11-viz-axis-label,
    .p11-viz-label {
      fill: var(--lab-muted);
      font-family: var(--lab-font);
      font-size: 13px;
      font-weight: 700;
    }

    .p11-viz-label {
      fill: var(--lab-ink);
    }

    .p11-viz-caption {
      margin: 0;
      color: var(--lab-muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .p11-viz-numberline {
      position: relative;
      min-height: 106px;
      border: 1px solid var(--lab-border-strong);
      border-radius: 12px;
      background: var(--lab-surface);
    }

    .p11-viz-numberline::before {
      content: "";
      position: absolute;
      left: 9%;
      right: 9%;
      top: 48px;
      height: 2px;
      background: var(--lab-border-strong);
    }

    .p11-viz-numberline-tick {
      position: absolute;
      left: var(--p11-tick-left);
      top: 36px;
      display: grid;
      justify-items: center;
      gap: 8px;
      transform: translateX(-50%);
    }

    .p11-viz-numberline-dot {
      width: 24px;
      height: 24px;
      border: 2px solid var(--lab-accent-green);
      border-radius: 50%;
      background: var(--lab-surface);
    }

    .p11-viz-numberline-label {
      color: var(--lab-muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
    }

    .p11-viz-bridge {
      position: absolute;
      left: 23%;
      right: 23%;
      top: 22px;
      height: 22px;
      border-top: 2px solid var(--lab-accent-pink);
      border-radius: 50%;
    }

    .p11-viz-swap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 12px;
      align-items: stretch;
    }

    .p11-viz-story-column {
      display: grid;
      align-content: start;
      gap: 9px;
      padding: 14px;
      border: 1px solid var(--lab-border);
      border-radius: 12px;
      background: var(--lab-surface-soft);
    }

    .p11-viz-story-title,
    .p11-viz-story-subtitle {
      margin: 0;
    }

    .p11-viz-story-title {
      color: var(--lab-ink);
      font-size: 18px;
      line-height: 1.2;
    }

    .p11-viz-story-subtitle,
    .p11-viz-swap-arrow {
      color: var(--lab-muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
    }

    .p11-viz-story-token {
      display: inline-flex;
      min-height: 30px;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--lab-surface);
      color: var(--lab-ink);
      font-size: 13px;
      font-weight: 700;
    }

    .p11-viz-swap-arrow {
      display: grid;
      place-items: center;
      min-width: 70px;
      text-align: center;
    }

    @media (max-width: 640px) {
      .p11-viz-swap {
        grid-template-columns: 1fr;
      }

      .p11-viz-swap-arrow {
        min-height: 34px;
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="./runtime.js"></script>
</body>

</html>
